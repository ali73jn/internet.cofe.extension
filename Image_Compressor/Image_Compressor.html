<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فشرده‌ساز هوشمند تصویر | سریع، امن و کاملاً آفلاین</title>

    <!-- کتابخانه‌ها -->
    <script src="./tailwind.js.download"></script>
    <link rel="stylesheet" href="./vazir.css">
    <script src="./piexif.min.js.download"></script>

    <style>
        /* استایل‌های سفارشی غیر از Tailwind */
        body {
            font-family: 'Vazirmatn', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #c0c0c0;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a0a0a0;
        }

        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(20px, -30px) scale(1.05); }
            66% { transform: translate(-10px, 15px) scale(0.95); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 8s infinite;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
        .animation-delay-4000 {
            animation-delay: 4s;
        }

        /* دکمه دانلود غیرفعال */
        #downloadBtn.pointer-events-none {
            pointer-events: none;
            opacity: 0.5;
        }
    </style>
</head>
<body class="min-h-screen text-gray-800 p-3 md:p-8 flex items-center justify-center bg-gray-50 relative overflow-x-hidden">

    <!-- لودینگ -->
    <div id="loadingOverlay" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-white/80 backdrop-blur-md transition-opacity duration-300 opacity-0 pointer-events-none hidden">
        <div class="relative flex justify-center items-center mb-5">
            <div class="absolute animate-ping w-24 h-24 rounded-full bg-blue-600 opacity-20"></div>
            <div class="w-16 h-16 border-4 border-gray-200 border-t-blue-600 rounded-full animate-spin"></div>
            <div class="absolute w-10 h-10 border-4 border-transparent border-t-blue-400 rounded-full animate-spin" style="animation-direction: reverse; animation-duration: 0.75s;"></div>
        </div>
        <p id="loadingText" class="text-gray-900 font-bold text-lg drop-shadow-md tracking-wide">در حال پردازش...</p>
        <p class="text-gray-500 text-sm mt-2 animate-pulse">لطفاً شکیبا باشید</p>
    </div>

    <!-- اشکال پس‌زمینه -->
    <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-blue-300 rounded-full mix-blend-screen filter blur-[100px] opacity-30 animate-blob pointer-events-none"></div>
    <div class="fixed top-[30%] right-[-10%] w-80 h-80 bg-blue-400 rounded-full mix-blend-screen filter blur-[120px] opacity-20 animate-blob animation-delay-2000 pointer-events-none"></div>
    <div class="fixed bottom-[-10%] left-[20%] w-80 h-80 bg-blue-300 rounded-full mix-blend-screen filter blur-[100px] opacity-20 animate-blob animation-delay-4000 pointer-events-none"></div>

    <!-- کارت اصلی -->
    <div class="max-w-5xl w-full bg-white/90 backdrop-blur-xl rounded-[2rem] shadow-2xl overflow-hidden border border-gray-200 relative z-10 flex flex-col">
        <!-- هدر -->
        <div class="bg-gradient-to-r from-blue-500 via-blue-300 to-blue-200 p-6 md:p-4 text-white text-center relative shadow-md flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-right pr-1 md:pr-3">
                <h1 class="text-3xl md:text-4xl font-extrabold mb-2 md:mb-1 tracking-tight text-blue-800 drop-shadow-md">فشرده‌ساز هوشمند تصویر</h1>
                <p class="text-blue-800 text-sm md:text-lg">سریع ، امن ، آفلاین</p>
            </div>
        </div>

        <div class="p-4 md:p-8">
            <!-- ناحیه آپلود -->
            <div id="uploadArea" class="border-2 border-dashed border-blue-300 bg-gray-50 rounded-3xl p-8 md:p-12 text-center hover:bg-white hover:border-blue-600 transition-all duration-300 cursor-pointer flex flex-col items-center justify-center min-h-[300px] md:min-h-[350px] group">
                <div class="bg-white p-5 md:p-6 rounded-full shadow-lg mb-4 md:mb-6 group-hover:scale-110 transition-transform duration-300 border border-gray-200 group-hover:border-blue-500/50">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 md:h-14 md:w-14 text-blue-500 drop-shadow-lg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                </div>
                <h3 class="text-xl md:text-2xl font-bold mb-2 md:mb-3 text-gray-900">تصویر خود را اینجا رها کنید</h3>
                <p class="text-gray-800 mb-6 md:mb-8 text-sm md:text-xl">یا برای انتخاب فایل کلیک کنید (JPG, PNG, WEBP)</p>
                <input type="file" id="fileInput" class="hidden" accept="image/jpeg, image/png, image/webp">
                
            </div>

            <!-- فضای کار -->
            <div id="workspace" class="hidden flex-col gap-4 md:gap-6">
                <!-- پنل کنترل -->
                <div class="bg-white rounded-2xl border border-gray-200 shadow-inner p-5 md:p-6">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-5 md:gap-6 mb-5 md:mb-6">
                        <!-- انتخاب فرمت -->
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2 md:mb-3 flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                                فرمت خروجی:
                            </label>
                            <div class="relative">
                                <select id="formatSelect" class="block w-full appearance-none bg-gray-100 border border-gray-300 text-gray-900 py-3.5 px-4 pr-8 rounded-xl leading-tight focus:outline-none focus:border-blue-600 transition-colors cursor-pointer font-medium text-sm md:text-base">
                                    <option value="image/jpeg" selected>JPEG (مناسب برای عکس)</option>
                                    <option value="image/webp">WEBP (بهترین فشرده‌سازی)</option>
                                    <option value="image/png">PNG (کیفیت بدون افت)</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-400">
                                    <svg class="fill-current h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"></path></svg>
                                </div>
                            </div>
                        </div>

                        <!-- اسلایدر ابعاد -->
                        <div>
                            <label for="scaleSlider" class="block text-sm font-bold text-gray-700 mb-2 md:mb-3 flex justify-between items-center">
                                <span class="flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                                    ابعاد تصویر:
                                </span>
                                <span id="scaleValue" class="bg-gray-200 text-gray-900 py-1 px-2.5 rounded-lg text-xs font-mono border border-gray-300">80%</span>
                            </label>
                            <div class="py-2">
                                <input type="range" id="scaleSlider" min="0.1" max="1" step="0.05" value="0.8" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                            </div>
                        </div>

                        <!-- اسلایدر کیفیت -->
                        <div>
                            <label for="qualitySlider" class="block text-sm font-bold text-gray-700 mb-2 md:mb-3 flex justify-between items-center">
                                <span class="flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                                    کیفیت:
                                </span>
                                <span id="qualityValue" class="bg-gray-200 text-gray-900 py-1 px-2.5 rounded-lg text-xs font-mono border border-gray-300">70%</span>
                            </label>
                            <div class="py-2">
                                <input type="range" id="qualitySlider" min="0.1" max="1" step="0.05" value="0.7" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                            </div>
                        </div>
                    </div>

                    <!-- تنظیمات پیشرفته -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5 md:gap-6 mb-5 md:mb-6 pt-5 border-t border-gray-200">
                        <!-- رسیدن به حجم دلخواه -->
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2 md:mb-3 flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                رسیدن به حجم دلخواه (KB):
                            </label>
                            <div class="flex gap-2">
                                <input type="number" id="targetSizeInput" placeholder="مثلاً: 150" class="w-full bg-gray-100 border border-gray-300 text-gray-900 py-2 px-4 rounded-xl focus:outline-none focus:border-blue-600 transition-colors text-sm font-mono placeholder-gray-400">
                                <button id="applyTargetBtn" class="bg-gray-200 border border-gray-300 hover:bg-blue-600 hover:border-blue-500 text-gray-700 hover:text-white px-4 py-2 rounded-xl text-sm font-bold transition-colors whitespace-nowrap">اعمال حجم</button>
                            </div>
                        </div>

                        <!-- گزینه‌ها -->
                        <div class="flex flex-col justify-center gap-3">
                            <label class="relative flex items-center cursor-pointer group">
                                <input type="checkbox" id="grayscaleToggle" class="sr-only peer">
                                <div class="w-10 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:-translate-x-5 peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:right-[2px] after:bg-white after:border-gray-300 after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600 peer-checked:after:bg-white border border-gray-300 peer-checked:border-blue-500"></div>
                                <span class="mr-3 text-sm font-medium text-gray-700 group-hover:text-gray-900 transition-colors">فیلتر سیاه و سفید (کاهش بیشتر)</span>
                            </label>

                            <label class="relative flex items-center cursor-pointer group" title="در صورت خاموش بودن، متادیتا فقط در فرمت JPEG حفظ می‌شود.">
                                <input type="checkbox" id="metadataToggle" class="sr-only peer" checked>
                                <div class="w-10 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:-translate-x-5 peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:right-[2px] after:bg-white after:border-gray-300 after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600 peer-checked:after:bg-white border border-gray-300 peer-checked:border-blue-500"></div>
                                <span class="mr-3 text-sm font-medium text-gray-700 transition-colors flex items-center gap-1 group-hover:text-gray-900">حذف متادیتا (EXIF)</span>
                            </label>
                        </div>
                    </div>

                    <!-- دکمه‌ها -->
                    <div class="flex flex-col-reverse md:flex-row justify-end gap-3 pt-4 md:pt-5 border-t border-gray-200">
                        <button id="resetBtn" class="w-full md:w-auto px-5 py-3 md:py-2.5 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-xl transition-colors text-sm font-bold active:scale-[0.98]">
                            انتخاب تصویر جدید
                        </button>
                        <a id="downloadBtn" href="#" class="w-full md:w-auto px-6 py-3 md:py-2.5 bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 text-white rounded-xl transition-all shadow-lg shadow-blue-600/20 flex items-center justify-center gap-2 text-sm font-bold pointer-events-none opacity-50 active:scale-[0.98]">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                            </svg>
                            ذخیره تصویر با فرمت <span id="btnExtTxt">JPG</span>
                        </a>
                    </div>
                </div>

                <!-- پیش‌نمایش‌ها -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                    <!-- تصویر اصلی -->
                    <div class="bg-white border border-gray-200 rounded-2xl overflow-hidden shadow-sm flex flex-col group relative">
                        <div class="bg-gray-50 p-3 md:p-4 border-b border-gray-200 flex justify-between items-center">
                            <div class="flex flex-col">
                                <h4 class="font-bold text-gray-700 flex items-center gap-2 text-sm md:text-base">
                                    <span class="w-2 h-2 rounded-full bg-gray-400"></span>
                                    تصویر اصلی
                                </h4>
                                <span id="originalRes" class="text-[10px] md:text-xs text-gray-500 mt-1 font-mono">-- x -- px</span>
                            </div>
                            <span id="originalSize" class="bg-gray-100 border border-gray-200 text-gray-700 text-xs py-1.5 px-2 md:px-3 rounded-lg font-mono">-- KB</span>
                        </div>
                        <div class="p-4 md:p-6 flex-grow flex items-center justify-center bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+CjxyZWN0IHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCIgZmlsbD0iI2Y5ZjlmOSIvPgo8cmVjdCB3aWR0aD0iMTAiIGhlaWdodD0iMTAiIGZpbGw9IiNlY2VjZWMiLz4KPHJlY3QgeD0iMTAiIHk9IjEwIiB3aWR0aD0iMTAiIGhlaWdodD0iMTAiIGZpbGw9IiNlY2VjZWMiLz4KPC9zdmc+')] relative min-h-[200px]">
                            <img id="originalPreview" class="max-h-[250px] md:max-h-[300px] object-contain rounded shadow-lg group-hover:scale-[1.02] transition-transform duration-500" src="" alt="پیش‌نمایش اصلی">
                        </div>
                    </div>

                    <!-- خروجی فشرده -->
                    <div class="bg-white border border-blue-300 rounded-2xl overflow-hidden shadow-lg flex flex-col group relative ring-1 ring-blue-500/10">
                        <div class="bg-blue-100 p-3 md:p-4 border-b border-blue-200 flex justify-between items-center">
                            <div class="flex flex-col">
                                <h4 class="font-bold text-gray-900 flex items-center gap-2 text-sm md:text-base">
                                    <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>
                                    خروجی نهایی
                                </h4>
                                <span id="compressedRes" class="text-[10px] md:text-xs text-blue-600 mt-1 font-mono">-- x -- px</span>
                            </div>
                            <div class="flex gap-2 items-center flex-wrap justify-end">
                                <span id="compressionRatio" class="text-emerald-600 text-[10px] md:text-xs font-bold bg-emerald-200 py-1.5 px-2 md:px-3 rounded-lg border border-emerald-200 hidden">-%</span>
                                <span id="compressedSize" class="bg-gray-100 border border-blue-200 text-gray-900 text-xs py-1.5 px-2 md:px-3 rounded-lg font-mono shadow-sm">-- KB</span>
                            </div>
                        </div>
                        <div class="p-4 md:p-6 flex-grow flex items-center justify-center bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+CjxyZWN0IHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCIgZmlsbD0iI2Y5ZjlmOSIvPgo8cmVjdCB3aWR0aD0iMTAiIGhlaWdodD0iMTAiIGZpbGw9IiNlY2VjZWMiLz4KPHJlY3QgeD0iMTAiIHk9IjEwIiB3aWR0aD0iMTAiIGhlaWdodD0iMTAiIGZpbGw9IiNlY2VjZWMiLz4KPC9zdmc+')] relative min-h-[200px]">
                            <img id="compressedPreview" class="max-h-[250px] md:max-h-[300px] object-contain rounded shadow-lg shadow-blue-900/20 group-hover:scale-[1.02] transition-transform duration-500" src="" alt="پیش‌نمایش فشرده">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./app.js.download"></script>
</body>
</html>
